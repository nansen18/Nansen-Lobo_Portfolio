    <style>
      #boot-loader {
        position: fixed; inset: 0; display: grid; place-items: center;
        background: #0a0a1a; z-index: 9999; transition: opacity .5s ease;
      }
      #boot-loader.hide { opacity: 0; pointer-events: none; }
      .boot-ring {
        width: 56px; height: 56px; border-radius: 50%;
        background: conic-gradient(from 0deg, #8b5cf6, #3b82f6, #c084fc, #8b5cf6);
        -webkit-mask: radial-gradient(circle 22px at center, transparent 98%, black 100%);
                mask: radial-gradient(circle 22px at center, transparent 98%, black 100%);
        animation: spin 1s linear infinite;
        filter: drop-shadow(0 0 18px rgba(139,92,246,.55));
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>

  <body>
    <div id="boot-loader"><div class="boot-ring"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        const el = document.getElementById('boot-loader');
        if (el) { el.classList.add('hide'); setTimeout(() => el.remove(), 600); }
      });
    </script>
  </body>
